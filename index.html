<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Flyer Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-header">
  <h1>✦ GOLD FLYER GENERATOR ✦</h1>
  <p>Paste harga emas → Generate pamflet otomatis</p>
</div>

<div class="workspace">
  <!-- LEFT: INPUT PANEL -->
  <div class="panel">
    <h2>✦ Input Harga</h2>

    <textarea id="inputText" placeholder="Paste teks harga emas di sini...

Contoh:
🛑BISMILLAH
Ready 2026
0.5gr = 1.700
1gr = 3.100
2gr = 6.000
3gr = 8.800
5gr = 14.250
10gr = 27.850
25gr = 69.000
50gr = 137.600
100gr = 275.000

Atau format lain:
0,5 gr | 1.640.000
1 gr = Rp3.140.000
dst..."></textarea>

    <div class="parsed-preview" id="parsedPreview">
      <div class="tag" id="parsedCount"></div>
      <div id="parsedList" style="margin-top:6px;"></div>
    </div>

    <div class="options-row">
      <div class="opt-group">
        <label>Nama Toko</label>
        <input type="text" id="brandName" placeholder="HAGIA SOFIA" value="HAGIA SOFIA">
      </div>
      <div class="opt-group">
        <label>Tipe Customer</label>
        <input type="text" id="customerType" placeholder="CUSTOMER" value="CUSTOMER">
      </div>
      <div class="opt-group">
        <label>Tanggal</label>
        <input type="text" id="flyerDate" placeholder="14 Maret 2026">
      </div>
      <div class="opt-group">
        <label>Kontak</label>
        <input type="text" id="contactInfo" placeholder="0812-3456-7890">
      </div>
      <div class="opt-group full-width">
        <label>Tema Warna</label>
        <select id="colorTheme">
          <option value="teal">Teal Elegan (seperti contoh)</option>
          <option value="dark">Hitam & Emas</option>
          <option value="royal">Royal Navy</option>
        </select>
      </div>
    </div>

    <button class="generate-btn" onclick="generateFlyer()">✦ GENERATE PAMFLET</button>
    <button class="download-btn" onclick="downloadFlyer()">↓ Download sebagai PNG</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- RIGHT: FLYER PREVIEW -->
  <div class="flyer-wrapper">
    <div id="flyerOutput">
      <div class="empty-flyer">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="8" width="48" height="48" rx="6" stroke="currentColor" stroke-width="2"/>
          <path d="M20 32h24M20 22h16M20 42h20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Pamflet Anda akan<br>muncul di sini setelah<br>klik <strong>Generate</strong></p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
